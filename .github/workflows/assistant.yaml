name: URL Downloader and Processor
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install aria2, zip, and unrar
        run: |
          sudo apt-get update
          # نصب ابزارهای مورد نیاز شامل unrar برای استخراج RAR
          sudo apt-get install -y aria2 zip unzip unrar

      - name: Downloader Execution
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          echo "🌐 Starting Download Process with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          mkdir -p downloads tmp_downloads

          # --- مرحله ۱: دانلود فایل‌ها ---
          for URL in $URLS; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"
            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --dir="tmp_downloads" \
              --out="$FILENAME" \
              "$URL"
          done

          # --- مرحله ۲: پردازش فایل‌ها (استخراج RAR و سپس Chunking) ---
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating zip archive: $ARCHIVE_NAME"
            # در حالت ZIP، همه چیز را به یک آرشیو می‌ریزیم (این آرشیو نهایی برای Chunking آماده است)
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            rm -rf tmp_downloads
          else
            echo "⚙️ Normal mode: Processing files for extraction and splitting..."
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              BASENAME=$(basename "$FILE")

              if [[ "$BASENAME" == *.rar ]]; then
                # --- قابلیت جدید: استخراج RAR و تبدیل به ZIP ---
                echo "📦 Found RAR file: $BASENAME. Extracting and converting to ZIP..."
                TEMP_OUTPUT_DIR="tmp_processed_${BASENAME}"
                mkdir -p "$TEMP_OUTPUT_DIR"
                unrar x "$FILE" "$TEMP_OUTPUT_DIR/"

                if [ -d "$TEMP_OUTPUT_DIR" ] && [ "$(ls -A $TEMP_OUTPUT_DIR)" ]; then
                  # تبدیل محتویات استخراج شده به ZIP
                  ZIP_ARCHIVE="downloads/${BASENAME%.rar}.zip"
                  zip -r -o "$ZIP_ARCHIVE" "$TEMP_OUTPUT_DIR"/*
                  echo "✅ Conversion complete: $ZIP_ARCHIVE created."
                fi

              elif [[ "$BASENAME" == *.zip ]]; then
                 # --- منطق ZIP دانلود شده: فقط کپی مستقیم (بدون استخراج) ---
                 echo "➡️ Found existing ZIP file: $BASENAME. Copying directly to downloads/."
                 cp "$FILE" "downloads/$BASENAME"

              else
                # حالت عادی: فایل معمولی، فقط کپی می‌شود
                echo "➡️ Copying standard file: $BASENAME to downloads/"
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi
          
          # --- مرحله ۳: اعمال Chunking بر روی همه فایل‌های نهایی در پوشه downloads/ ---
          echo "✂️ Applying chunking to all final files in 'downloads/'..."
          for FILE in downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")

              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting into ${SPLIT_THRESHOLD_MB}MB parts (zip-split)"
                # تقسیم فایل به بخش‌های کوچک‌تر با پسوند .partX.zip
                split -b "${SPLIT_THRESHOLD_MB}m" "$FILE" "downloads/chunk_"
              else
                echo "✅ $BASENAME is within size limit or threshold is 0. Keeping as single file."
              fi
          done


      - name: Commit & Push in batches of 5 files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "🏷️  Preparing to commit files"
          # Collect all new/modified files under downloads/
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi
          BATCH_SIZE=5
          BATCH_NUM=0
          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"
            git add "${BATCH[@]}"
            git commit -m "[Downloaded Files] Add downloaded files — batch $BATCH_NUM [skip ci]"
            # Pull with rebase before each push to avoid conflicts
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
            echo "✅ Batch $BATCH_NUM pushed"
          done
          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
