name: URL Downloader and Processor
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode (normal or zip)'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (Note: Splitting is disabled in this version)'
        required: false
        default: 90
        type: number
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies (aria2, zip, unrar)
        run: |
          sudo apt-get update
          # نصب ابزارهای مورد نیاز شامل aria2، zip و unrar برای استخراج RAR
          sudo apt-get install -y aria2 zip unzip unrar
      - name: Downloader Execution
        run: |
          echo "🌐 Starting Download Process"
          echo ""
          mkdir -p downloads tmp_downloads
          
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          
          # 1. دانلود هر URL به پوشه موقت
          for URL in $URLS; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"
            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --dir="tmp_downloads" \
              --out="$FILENAME" \
              "$URL"
          done

          # 2. پردازش فایل‌های دانلود شده (استخراج RAR و کپی نهایی)
          echo "⚙️ Starting file processing..."
          
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            BASENAME=$(basename "$FILE")
            TEMP_OUTPUT_DIR="tmp_processed_${BASENAME}"
            mkdir -p "$TEMP_OUTPUT_DIR"

            if [[ "$BASENAME" == *.rar ]]; then
              echo "📦 Found RAR file: $BASENAME. Extracting..."
              # استخراج فایل RAR به یک پوشه موقت جدید
              unrar x "$FILE" "$TEMP_OUTPUT_DIR/"
              
              # انتقال محتویات استخراج شده به پوشه اصلی (downloads/)
              if [ -d "$TEMP_OUTPUT_DIR" ] && [ "$(ls -A $TEMP_OUTPUT_DIR)" ]; then
                echo "✅ Successfully extracted. Moving contents to downloads/"
                mv "$TEMP_OUTPUT_DIR"/* downloads/ 2>/dev/null || true
              else
                 echo "⚠️ RAR file $BASENAME was empty or extraction failed. Copying original."
                 cp "$FILE" "downloads/$BASENAME" # در صورت شکست، فایل اصلی را کپی کن
              fi

            elif [[ "$BASENAME" == *.zip ]]; then
               # اگر فایل از قبل zip بود، آن را استخراج می‌کنیم
               echo "📦 Found ZIP file: $BASENAME. Extracting..."
               unzip -q "$FILE" -d downloads/
            else
              # حالت عادی: کپی مستقیم فایل‌ها
              echo "➡️ Copying standard file: $BASENAME to downloads/"
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          # 3. مدیریت خروجی نهایی بر اساس MODE
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating final zip archive: $ARCHIVE_NAME"
            # اطمینان از اینکه فقط فایل‌های نهایی در پوشه downloads هستند
            zip -r "$ARCHIVE_NAME" downloads/
            rm -rf tmp_downloads # پاکسازی موقت
          else
            echo "✅ Normal mode complete. Files are in the 'downloads/' directory."
          fi

      - name: Commit & Push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "🏷️  Preparing to commit files"
          # Collect all new/modified files under downloads/
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi
          BATCH_SIZE=5
          BATCH_NUM=0
          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"
            git add "${BATCH[@]}"
            git commit -m "[Downloaded Files] Add downloaded files — batch $BATCH_NUM [skip ci]"
            # Pull with rebase before each push to avoid conflicts
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
            echo "✅ Batch $BATCH_NUM pushed"
          done
          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
